{% extends 'base.html' %}
{% block content %}

<style>
/* Background */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
}

/* Animated background */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Center wrapper */
.page-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card styling */
.form-card {
    width: 400px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover glow */
.form-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(0, 255, 200, 0.3),
                0 0 50px rgba(0, 150, 255, 0.2);
}

/* Title */
.form-card h3 {
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

/* Inputs & select */
.form-card input,
.form-card select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    transition: all 0.3s ease;
}

/* Focus glow */
.form-card input:focus,
.form-card select:focus {
    box-shadow: 0 0 8px rgba(0, 255, 200, 0.7);
    background: rgba(255, 255, 255, 0.15);
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #ff9966, #ff5e62);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* Button hover glow */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 100, 100, 0.7),
                0 0 30px rgba(255, 50, 50, 0.5);
}
/* Placeholder styling */
.form-card input::placeholder {
    color: rgba(255, 255, 255, 0.7);
    opacity: 1; /* ensures consistent visibility across browsers */
}

.form-card input:focus::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

/* Make dropdown text readable */
.form-card select {
    color: #fff;
}

/* Style dropdown options */
.form-card select option {
    background-color: #1c1c1c; /* dark background for options */
    color: #ffffff;           /* white text */
}

/* Optional: hover effect (limited browser support) */
.form-card select option:hover {
    background-color: #2c5364;
    color: #ffffff;
}
</style>

<div class="page-wrapper">
    <div class="form-card">
        <h3>Add Expense</h3>

        <form method="POST">
            {% csrf_token %}

            <select name="category">
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>

            <input type="number" name="amount" placeholder="Amount">

            <button type="submit">ADD EXPENSE</button>
        </form>
    </div>
</div>

{% endblock %}
