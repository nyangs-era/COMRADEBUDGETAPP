{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h3 class="text-center">Create Account</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100">Register</button>
            </form>
            <a href="/login/" class="text-center mt-3">Already have an account?</a>
        </div>
    </div>
</div>

{% endblock %}
