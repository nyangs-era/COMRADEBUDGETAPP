{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h3 class="text-center">Login</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-success w-100">Login</button>
            </form>
            <a href="/register/" class="text-center mt-3">Create account</a>
        </div>
    </div>
</div>

{% endblock %}
